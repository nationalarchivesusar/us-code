name: Recover scanned public-law viewer sources

on:
  pull_request:
    branches: [main]
    types: [synchronize]
    paths:
      - .github/workflows/recover-viewer-sources.yml
  workflow_dispatch:

permissions:
  contents: read

jobs:
  recover:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref || github.ref_name }}

      - name: Install browser and OCR tools
        run: |
          sudo apt-get update
          sudo apt-get install -y tesseract-ocr
          npm init -y >/dev/null 2>&1
          npm install playwright
          npx playwright install --with-deps chromium

      - name: Render every PDF page and capture viewer image responses
        id: render
        continue-on-error: true
        shell: bash
        run: |
          set -uo pipefail
          mkdir -p viewer-recovery
          cat > recover-viewer.mjs <<'JS'
          import { chromium } from 'playwright';
          import fs from 'node:fs';
          import path from 'node:path';

          const jobs = {
            'PL-018-141': { id: '19W_vSdy0jLzg2fzIQv4xNlkvAdhdCuY6', pages: 15 },
            'PL-018-142': { id: '1-SEQeh3WiGffnAa_YDG87XKqRzUTfOeQ', pages: 4 },
            'PL-025-182': { id: '1oGACcmQOwdwGOGR3uCpumI3K8l8LV93_', pages: 20 },
            'PL-037-261': { id: '1n1XLX1hMQQ0LFWg6kIM_CL4m8JgCOsz_', pages: 120 },
            'PL-012-076': { id: '1nJpAsDw6hVsDDFGzCXaf6T0zOpKDr3o2', pages: 20 },
          };

          const browser = await chromium.launch({ headless: true });
          for (const [law, info] of Object.entries(jobs)) {
            const out = path.join('viewer-recovery', law);
            fs.mkdirSync(out, { recursive: true });
            const context = await browser.newContext({ viewport: { width: 1600, height: 1200 } });
            const page = await context.newPage();
            const seen = new Set();
            let imageNo = 0;
            const responses = [];
            const pending = [];
            page.on('response', (response) => {
              const task = (async () => {
                const url = response.url();
                const ct = (response.headers()['content-type'] || '').toLowerCase();
                if (!ct.startsWith('image/') && !url.includes('/viewer/img') && !url.includes('/drive-viewer/')) return;
                if (seen.has(url)) return;
                seen.add(url);
                try {
                  const body = await response.body();
                  if (body.length < 1000) return;
                  imageNo += 1;
                  let ext = 'bin';
                  if (ct.includes('png')) ext = 'png';
                  else if (ct.includes('jpeg') || ct.includes('jpg')) ext = 'jpg';
                  else if (ct.includes('webp')) ext = 'webp';
                  fs.writeFileSync(path.join(out, `network-${String(imageNo).padStart(3,'0')}.${ext}`), body);
                  responses.push({ number: imageNo, url, contentType: ct, bytes: body.length });
                } catch (err) {
                  responses.push({ url, error: String(err) });
                }
              })();
              pending.push(task);
            });

            const url = `https://drive.google.com/file/d/${info.id}/view?usp=sharing`;
            try {
              await page.goto(url, { waitUntil: 'domcontentloaded', timeout: 120000 });
              await page.waitForTimeout(8000);
              fs.writeFileSync(path.join(out, 'viewer.html'), await page.content());
              fs.writeFileSync(path.join(out, 'body.txt'), await page.locator('body').innerText().catch(() => ''));
              for (let i = 0; i < info.pages + 8; i += 1) {
                await page.keyboard.press('PageDown');
                await page.mouse.wheel(0, 1200);
                await page.waitForTimeout(700);
              }
              await page.keyboard.press('Home');
              for (let i = 0; i < info.pages + 4; i += 1) {
                await page.keyboard.press('ArrowRight');
                await page.waitForTimeout(500);
              }
              await page.waitForTimeout(3000);
            } catch (err) {
              fs.writeFileSync(path.join(out, 'browser-error.txt'), String(err));
            }
            await Promise.allSettled(pending);
            fs.writeFileSync(path.join(out, 'responses.json'), JSON.stringify(responses, null, 2));
            await context.close();
          }
          await browser.close();
          JS
          node recover-viewer.mjs > viewer-recovery/browser.log 2>&1
          browser_rc=$?

          for law in PL-018-141 PL-018-142 PL-025-182 PL-037-261 PL-012-076; do
            out="viewer-recovery/$law"
            mkdir -p "$out/ocr"
            : > "$out/combined.txt"
            found=0
            while IFS= read -r img; do
              found=$((found+1))
              base="$out/ocr/page-$(printf '%03d' "$found")"
              tesseract "$img" "$base" --dpi 300 >/dev/null 2>&1 || true
              if [[ -s "$base.txt" ]]; then cat "$base.txt" >> "$out/combined.txt"; printf '\n\n' >> "$out/combined.txt"; fi
            done < <(find "$out" -maxdepth 1 -type f \( -name 'network-*.png' -o -name 'network-*.jpg' -o -name 'network-*.webp' \) | sort)
            printf 'captured_images=%s\ncombined_chars=%s\n' "$found" "$(wc -c < "$out/combined.txt")" > "$out/summary.txt"
          done
          rm -f recover-viewer.mjs
          exit "$browser_rc"

      - name: Upload partial or complete browser recovery
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: recovered-viewer-public-law-sources
          path: viewer-recovery/
          retention-days: 7
