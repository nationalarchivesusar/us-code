name: Recover scanned public-law viewer sources

on:
  pull_request:
    branches: [main]
    types: [synchronize]
    paths:
      - .github/workflows/recover-viewer-sources.yml
  workflow_dispatch:

permissions:
  contents: read

jobs:
  recover:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref || github.ref_name }}
      - name: Install OCR tools
        run: |
          sudo apt-get update
          sudo apt-get install -y tesseract-ocr
      - name: Open fresh Drive viewers, recover every page, and OCR
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p viewer-recovery
          python - <<'PY'
          from __future__ import annotations
          import html, re, subprocess
          from pathlib import Path

          jobs = {
              'PL-018-141': '19W_vSdy0jLzg2fzIQv4xNlkvAdhdCuY6',
              'PL-018-142': '1-SEQeh3WiGffnAa_YDG87XKqRzUTfOeQ',
              'PL-012-076': '1nJpAsDw6hVsDDFGzCXaf6T0zOpKDr3o2',
          }
          root = Path('viewer-recovery')
          for law, file_id in jobs.items():
              out = root / law
              out.mkdir(parents=True, exist_ok=True)
              cookies = out / 'cookies.txt'
              view_url = f'https://drive.google.com/file/d/{file_id}/view?usp=sharing'
              page = out / 'viewer.html'
              proc = subprocess.run([
                  'curl','-L','--fail','--silent','--show-error','--max-time','120',
                  '-A','Mozilla/5.0','-c',str(cookies),'-b',str(cookies),
                  '-o',str(page),view_url
              ], capture_output=True, text=True)
              if proc.returncode:
                  (out/'viewer.error.txt').write_text(proc.stderr)
                  continue
              source = page.read_text(errors='replace')
              urls = re.findall(r'https://drive\.google\.com/viewer/img\?[^"\'<> ]+', source)
              normalized=[]
              for url in urls:
                  url=html.unescape(url).replace('\\u003d','=').replace('\\u0026','&')
                  if url not in normalized: normalized.append(url)
              (out/'page-urls.txt').write_text('\n'.join(normalized)+'\n',encoding='utf-8')
              texts=[]
              for index,url in enumerate(normalized,1):
                  high=re.sub(r'([?&])w=\d+',r'\1w=2000',url)
                  img=out/f'page-{index:02d}.png'
                  req=subprocess.run([
                      'curl','-L','--fail','--silent','--show-error','--max-time','120',
                      '-A','Mozilla/5.0','-e',view_url,'-c',str(cookies),'-b',str(cookies),
                      '-o',str(img),high
                  ],capture_output=True,text=True)
                  if req.returncode or not img.exists() or img.stat().st_size < 1000:
                      # Retry the exact small preview URL when the high-resolution variant is rejected.
                      req=subprocess.run([
                          'curl','-L','--fail','--silent','--show-error','--max-time','120',
                          '-A','Mozilla/5.0','-e',view_url,'-c',str(cookies),'-b',str(cookies),
                          '-o',str(img),url
                      ],capture_output=True,text=True)
                  if req.returncode or not img.exists() or img.stat().st_size < 1000:
                      (out/f'page-{index:02d}.error.txt').write_text(req.stderr or 'page unavailable')
                      continue
                  base=out/f'page-{index:02d}'
                  subprocess.run(['tesseract',str(img),str(base),'--dpi','300'],check=False,capture_output=True,text=True)
                  text_file=base.with_suffix('.txt')
                  texts.append(text_file.read_text(errors='replace') if text_file.exists() else '')
              (out/'combined.txt').write_text('\n\n'.join(texts),encoding='utf-8')
              (out/'summary.txt').write_text(
                  f'viewer_bytes={page.stat().st_size}\npage_urls={len(normalized)}\nocr_pages={len(texts)}\nocr_chars={sum(map(len,texts))}\n',
                  encoding='utf-8'
              )
              print(law,(out/'summary.txt').read_text().replace('\n',' '))
          PY
      - uses: actions/upload-artifact@v4
        with:
          name: recovered-viewer-public-law-sources
          path: viewer-recovery/
          retention-days: 7
