name: Recover held public-law sources

on:
  pull_request:
    branches: [main]
    types: [synchronize]
    paths:
      - .github/workflows/recover-public-law-sources.yml
  workflow_dispatch:

permissions:
  contents: read

jobs:
  recover:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref || github.ref_name }}
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install document extractors
        run: python -m pip install --disable-pip-version-check python-docx pypdf
      - name: Recover PL 25-182 from its canonical Google Document
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p recovered-pl25
          document_id='1Igq9qIfmiivjc68tCSzwW67ZrawbOMN3v11VhPkNHig'
          curl -L --silent --show-error --max-time 120 -A 'Mozilla/5.0' \
            -o recovered-pl25/source.docx \
            "https://docs.google.com/document/d/${document_id}/export?format=docx" || true
          curl -L --silent --show-error --max-time 120 -A 'Mozilla/5.0' \
            -o recovered-pl25/source.pdf \
            "https://docs.google.com/document/d/${document_id}/export?format=pdf" || true
          python - <<'PY'
          from pathlib import Path
          import hashlib, json
          from docx import Document
          from pypdf import PdfReader
          root=Path('recovered-pl25')
          candidates=[]
          docx=root/'source.docx'
          if docx.exists() and docx.read_bytes().startswith(b'PK\x03\x04'):
              doc=Document(str(docx))
              candidates.append(('docx','\n'.join(p.text for p in doc.paragraphs)))
          pdf=root/'source.pdf'
          if pdf.exists() and pdf.read_bytes().startswith(b'%PDF-'):
              reader=PdfReader(str(pdf))
              candidates.append(('pdf','\n\n'.join((p.extract_text() or '') for p in reader.pages)))
          candidates.sort(key=lambda item:len(item[1]),reverse=True)
          kind,text=candidates[0] if candidates else ('none','')
          (root/'authenticated.txt').write_text(text,encoding='utf-8')
          record={'law_id':'PL-025-182','selected_kind':kind,'characters':len(text),'sha256':hashlib.sha256(text.encode()).hexdigest() if text else '','contains_enactment_formula':'be it enacted' in text.lower()}
          (root/'record.json').write_text(json.dumps(record,indent=2)+'\n')
          print(record)
          PY
      - uses: actions/upload-artifact@v4
        with:
          name: recovered-pl25-source
          path: recovered-pl25/
          retention-days: 7
