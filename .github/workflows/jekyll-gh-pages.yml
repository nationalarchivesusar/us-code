name: Build and deploy U.S. Code to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    name: Build Pages site
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repository and Git LFS files
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: python -m pip install --disable-pip-version-check -r requirements.txt

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Verify Title 42 source
        shell: bash
        run: |
          set -euo pipefail
          test -s usc/usc42.xml
          if head -n 1 usc/usc42.xml | grep -q "version https://git-lfs.github.com/spec"; then
            echo "::error::usc/usc42.xml is still a Git LFS pointer."
            exit 1
          fi

      - name: Build website data
        shell: bash
        run: |
          set -euo pipefail
          rm -rf data/title-42
          python tools/build_title42_chunks.py
          python tools/build_index.py
          test -s data/titles.json
          test -s data/title-42/manifest.json

      - name: Run website validation
        shell: bash
        run: |
          set -euo pipefail
          python tools/check_encoding.py
          python tools/check_title42_build.py
          python tools/audit_applied_material.py
          python -m unittest discover -s tests -p "test_check_encoding.py" -v
          node --test tests/test_usar_notes.mjs tests/test_citation_routing.mjs

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Prepare static website only
        shell: bash
        run: |
          set -euo pipefail
          rm -rf _site
          mkdir -p _site

          cp index.html 404.html _site/
          cp -a assets _site/assets
          cp -a data _site/data
          cp -a usc _site/usc

          # Title 42 is published through chunked files in data/title-42.
          rm -f _site/usc/usc42.xml
          touch _site/.nojekyll

          test -s _site/index.html
          test -s _site/404.html
          test -s _site/data/titles.json
          test -s _site/data/title-42/manifest.json
          test ! -e _site/usc/usc42.xml
          test ! -e _site/audit
          test ! -e _site/codification
          test ! -e _site/tools
          test ! -e _site/tests

          SECTION_COUNT=$(find _site/data/title-42 -type f -name "*.xml" | wc -l)
          if (( SECTION_COUNT < 8000 )); then
            echo "::error::The generated site contains too few Title 42 sections: $SECTION_COUNT"
            exit 1
          fi

          SITE_BYTES=$(du -sb _site | cut -f1)
          SAFE_LIMIT=$((900 * 1024 * 1024))
          echo "Static site size: $SITE_BYTES bytes"
          if (( SITE_BYTES > SAFE_LIMIT )); then
            echo "::error::Generated site exceeds the 900 MiB safety limit."
            exit 1
          fi

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./_site
          retention-days: 1

  deploy:
    name: Deploy GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
