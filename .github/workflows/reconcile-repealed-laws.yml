name: Reconcile repealed public laws

on:
  push:
    branches:
      - repair/repealed-laws

permissions:
  contents: write

jobs:
  reconcile:
    if: ${{ !contains(github.event.head_commit.message, '[repealed-law-bot]') }}
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout complete repository history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install XML dependency
        run: python -m pip install --disable-pip-version-check lxml

      - name: Apply conservative repealed-law reconciliation
        id: reconcile
        shell: bash
        run: |
          set +e
          python tools/reconcile_repealed_laws.py
          status=$?
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Validate XML and encoding
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path
          from lxml import etree
          parser = etree.XMLParser(huge_tree=True, recover=False)
          files = sorted(Path('usc').glob('*.xml'))
          for path in files:
              etree.parse(str(path), parser)
          print(f'Parsed {len(files)} XML files successfully.')
          PY
          python tools/check_encoding.py
          git diff --check

      - name: Commit reconciliation results
        id: commit
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add usc audit/repealed-law-reconciliation.json audit/repealed-law-reconciliation.md
          if git diff --cached --quiet; then
            echo "committed=false" >> "$GITHUB_OUTPUT"
          else
            git commit -m "[repealed-law-bot] Apply safe repealed-law reconciliation"
            git push origin HEAD:repair/repealed-laws
            echo "committed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Require complete manual reconciliation
        if: ${{ steps.reconcile.outputs.status != '0' }}
        run: |
          echo "The safe pass completed and was committed, but mixed-law conflicts remain. Review audit/repealed-law-reconciliation.json."
          exit 1
