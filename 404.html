    <title>US Code Library | United States of America Roblox</title>
    <script>
      // GitHub Pages SPA fallback. Valid Code citation routes are generated as
      // static social-metadata pages during deployment; this remains the safe
      // fallback for unknown paths and preserves the requested URL for app.js.
      (function () {
        var BASE_PATH = "/us-code/";
        var loc = window.location;
        var afterBase = loc.pathname.startsWith(BASE_PATH)
          ? loc.pathname.slice(BASE_PATH.length)
          : loc.pathname.replace(/^\/+/, "");
        var suffix = afterBase + loc.search + loc.hash;
        var target = BASE_PATH + "?redirect=" + encodeURIComponent(suffix);
        window.location.replace(target);
      })();
    </script>
